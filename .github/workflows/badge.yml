name: Generate Badge
on:
  workflow_dispatch:
  schedule:
    - cron: 0 11 * 1-2,11-12 1
    - cron: 0 10 * 3-10 1

jobs:
  badge:
    name: Generate Badge
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          architecture: x64
          cache: npm
          node-version: 24

      - name: Generate
        run: node badge.js

      - name: Convert SVG to PNG
        run: |-
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin
          for svg in badge-*.svg; do
            rsvg-convert "$svg" -o "${svg%.svg}.png"
          done

      - name: Delete branch
        run: |-
          if git ls-remote --exit-code --heads origin badges; then
            git push origin --delete badges
          fi

      - name: Create branch
        run: |-
          git config --global user.name "kdevbot[bot]"
          git config --global user.email "155479163+kdevbot[bot]@users.noreply.github.com"
          git checkout --orphan badges
          git reset --hard
          git add badge-*.png
          git commit -m "Create badges branch with badges"
          git push -u origin badges --force